[env:nucleo_g431rb]
; Pin the platform so the STM32Cube HAL generation is reproducible. The FDCAN
; DataLength convention changed across HAL revisions; motion_can.cpp is now
; HAL-version-safe, but pinning keeps every rebuild identical to the validated one.
platform = ststm32@19.7.0
board = nucleo_g431rb
framework = arduino

lib_deps = 
    askuric/Simple FOC @ ^2.3.2
    simplefoc/SimpleFOCDrivers
    symlink://../common       ; Explicitly link ONLY the common folder

build_flags =
    -I include
    -I ../common
    -D HAL_OPAMP_MODULE_ENABLED
    -D HAL_FDCAN_MODULE_ENABLED

upload_protocol = stlink
monitor_speed = 115200