<!DOCTYPE html>
<html>

<head>
    <title>VESPA Stereo Calibration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .video-container {
            text-align: center;
        }

        img {
            border: 2px solid #444;
            border-radius: 5px;
            max-height: 90vh;
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 450px;
        }

        .profile-manager {
            background: #333;
            padding: 15px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        select {
            padding: 5px;
            font-size: 14px;
            width: 60%;
        }

        .cam-controls {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 5px;
            transition: opacity 0.3s;
        }

        .control-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        label {
            display: inline-block;
            width: 80px;
        }

        input[type="range"] {
            width: 130px;
            margin-right: 10px;
        }

        input[type="number"] {
            width: 60px;
            padding: 3px;
            border-radius: 3px;
            border: none;
            text-align: center;
        }

        input:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .val-display {
            width: 70px;
            text-align: right;
            color: #00ffcc;
            font-weight: bold;
            margin-left: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover:not(:disabled) {
            background: #0056b3;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-create {
            background: #17a2b8;
            padding: 6px 10px;
        }

        .btn-create:hover {
            background: #138496;
        }

        .btn-save {
            background: #28a745;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-save:hover:not(:disabled) {
            background: #218838;
        }

        .btn-match {
            background: #6f42c1;
            padding: 8px;
            margin-top: 10px;
            width: 100%;
        }

        .btn-match:hover:not(:disabled) {
            background: #59339d;
        }

        .btn-exit {
            background: #dc3545;
            width: 100%;
            margin-top: auto;
            padding: 15px;
            font-size: 16px;
        }

        .btn-exit:hover {
            background: #c82333;
        }
    </style>
</head>

<body>

    <h2 style="text-align: center;">Project VESPA Optical Calibration</h2>

    <div class="main-container">
        <div class="video-container">
            <img src="{{ url_for('video_feed') }}" alt="Dual Camera Stream">
        </div>

        <div class="controls-panel">

            <div class="profile-manager">
                <h3>Profile Manager</h3>
                <div class="profile-row">
                    <label style="width:100px;">Active Profile:</label>
                    <select id="profileSelect" onchange="loadSelectedProfile()"></select>
                </div>
                <div class="profile-row">
                    <button class="btn-create" onclick="createNewProfile()">+ Create New Profile</button>
                </div>
            </div>

            <div class="cam-controls" id="cam0">
                <h3>Camera 0 (/dev/video0) - Left</h3>
                <div class="control-group">
                    <label>Exposure:</label>
                    <input type="range" id="exp0_slider" min="1" max="1000"
                        oninput="syncInputs(0, 'exposure', this.value, 'slider')"
                        onchange="sendCtrl(0, 'exposure', this.value)">
                    <input type="number" id="exp0_num" min="1" max="65523"
                        oninput="syncInputs(0, 'exposure', this.value, 'num')"
                        onchange="sendCtrl(0, 'exposure', this.value)">
                    <span id="exp0_val" class="val-display"></span>
                </div>
                <div class="control-group">
                    <label>Gain:</label>
                    <input type="range" id="gain0_slider" min="100" max="1500"
                        oninput="syncInputs(0, 'analogue_gain', this.value, 'slider')"
                        onchange="sendCtrl(0, 'analogue_gain', this.value)">
                    <input type="number" id="gain0_num" min="100" max="1500"
                        oninput="syncInputs(0, 'analogue_gain', this.value, 'num')"
                        onchange="sendCtrl(0, 'analogue_gain', this.value)">
                    <span id="gain0_val" class="val-display"></span>
                </div>
                <div class="control-group">
                    <label>H-Flip:</label>
                    <input type="checkbox" id="hflip0" onchange="sendCtrl(0, 'horizontal_flip', this.checked ? 1 : 0)">
                </div>
                <div class="control-group">
                    <label>V-Flip:</label>
                    <input type="checkbox" id="vflip0" onchange="sendCtrl(0, 'vertical_flip', this.checked ? 1 : 0)">
                </div>
            </div>

            <div class="cam-controls" id="cam1">
                <h3>Camera 1 (/dev/video1) - Right</h3>
                <div class="control-group">
                    <label>Exposure:</label>
                    <input type="range" id="exp1_slider" min="1" max="1000"
                        oninput="syncInputs(1, 'exposure', this.value, 'slider')"
                        onchange="sendCtrl(1, 'exposure', this.value)">
                    <input type="number" id="exp1_num" min="1" max="65523"
                        oninput="syncInputs(1, 'exposure', this.value, 'num')"
                        onchange="sendCtrl(1, 'exposure', this.value)">
                    <span id="exp1_val" class="val-display"></span>
                </div>
                <div class="control-group">
                    <label>Gain:</label>
                    <input type="range" id="gain1_slider" min="100" max="1500"
                        oninput="syncInputs(1, 'analogue_gain', this.value, 'slider')"
                        onchange="sendCtrl(1, 'analogue_gain', this.value)">
                    <input type="number" id="gain1_num" min="100" max="1500"
                        oninput="syncInputs(1, 'analogue_gain', this.value, 'num')"
                        onchange="sendCtrl(1, 'analogue_gain', this.value)">
                    <span id="gain1_val" class="val-display"></span>
                </div>
                <div class="control-group">
                    <label>H-Flip:</label>
                    <input type="checkbox" id="hflip1" onchange="sendCtrl(1, 'horizontal_flip', this.checked ? 1 : 0)">
                </div>
                <div class="control-group">
                    <label>V-Flip:</label>
                    <input type="checkbox" id="vflip1" onchange="sendCtrl(1, 'vertical_flip', this.checked ? 1 : 0)">
                </div>

                <button class="btn-match" id="btnMatch" onclick="matchCam0()">↓ Match Camera 0 Settings ↓</button>
            </div>

            <button class="btn-save" id="btnSave" onclick="applyAndSave()">Apply & Save to Pipeline Config</button>

            <button class="btn-exit" onclick="shutdownServer()">🛑 Shutdown Tool</button>
        </div>
    </div>

    <script>
        function formatExposure(val) { return (val * 14.5).toFixed(0) + " µs"; }
        function formatGain(val) { return (val / 100.0).toFixed(2) + "x"; }

        function syncInputs(camId, ctrl, value, source) {
            let shortCtrl = ctrl === 'exposure' ? 'exp' : 'gain';
            let parsedVal = parseInt(value) || 0;

            if (source === 'slider') {
                document.getElementById(`${shortCtrl}${camId}_num`).value = parsedVal;
            } else if (source === 'num') {
                document.getElementById(`${shortCtrl}${camId}_slider`).value = parsedVal;
            }

            let displayStr = ctrl === 'exposure' ? formatExposure(parsedVal) : formatGain(parsedVal);
            document.getElementById(`${shortCtrl}${camId}_val`).innerText = displayStr;
        }

        function sendCtrl(camId, ctrl, value) {
            fetch('/update_control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cam_id: camId, control: ctrl, value: parseInt(value) })
            });
        }

        // Toggles the locked state of the UI when 'default' is selected
        function setReadOnlyMode(isReadOnly) {
            const inputs = document.querySelectorAll('.cam-controls input, #btnSave, #btnMatch');
            inputs.forEach(input => input.disabled = isReadOnly);

            const panels = document.querySelectorAll('.cam-controls');
            panels.forEach(panel => panel.style.opacity = isReadOnly ? '0.6' : '1.0');
        }

        function matchCam0() {
            const exp = document.getElementById('exp0_num').value;
            const gain = document.getElementById('gain0_num').value;
            const hflip = document.getElementById('hflip0').checked;
            const vflip = document.getElementById('vflip0').checked;

            document.getElementById('exp1_slider').value = exp;
            document.getElementById('exp1_num').value = exp;
            syncInputs(1, 'exposure', exp, 'num');
            sendCtrl(1, 'exposure', exp);

            document.getElementById('gain1_slider').value = gain;
            document.getElementById('gain1_num').value = gain;
            syncInputs(1, 'analogue_gain', gain, 'num');
            sendCtrl(1, 'analogue_gain', gain);

            document.getElementById('hflip1').checked = hflip;
            sendCtrl(1, 'horizontal_flip', hflip ? 1 : 0);

            document.getElementById('vflip1').checked = vflip;
            sendCtrl(1, 'vertical_flip', vflip ? 1 : 0);
        }

        function applyConfigData(data) {
            const mappings = [
                { id: 0, conf: data.camera0 },
                { id: 1, conf: data.camera1 }
            ];

            mappings.forEach(m => {
                document.getElementById(`exp${m.id}_slider`).value = m.conf.exposure;
                document.getElementById(`exp${m.id}_num`).value = m.conf.exposure;
                syncInputs(m.id, 'exposure', m.conf.exposure, 'num');

                document.getElementById(`gain${m.id}_slider`).value = m.conf.analogue_gain;
                document.getElementById(`gain${m.id}_num`).value = m.conf.analogue_gain;
                syncInputs(m.id, 'analogue_gain', m.conf.analogue_gain, 'num');

                document.getElementById(`hflip${m.id}`).checked = m.conf.horizontal_flip === 1;
                document.getElementById(`vflip${m.id}`).checked = m.conf.vertical_flip === 1;
            });

            fetch('/apply_full_config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        function loadProfilesList() {
            fetch('/list_profiles')
                .then(res => res.json())
                .then(data => {
                    const select = document.getElementById('profileSelect');
                    select.innerHTML = '';
                    data.profiles.forEach(p => {
                        let opt = document.createElement('option');
                        opt.value = p;
                        opt.innerHTML = p;
                        select.appendChild(opt);
                    });

                    // Set dropdown to the active profile loaded from the backend
                    select.value = data.active;
                    loadSelectedProfile();
                });
        }

        function loadSelectedProfile() {
            const name = document.getElementById('profileSelect').value;

            // If default is selected, lock the UI. Otherwise, unlock it.
            setReadOnlyMode(name === 'default');

            fetch(`/load_profile/${name}`)
                .then(res => res.json())
                .then(data => applyConfigData(data));
        }

        function createNewProfile() {
            const name = prompt("Enter a name for the new profile:");
            if (name && name.trim() !== "" && name.toLowerCase() !== "default") {
                fetch('/create_profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name.trim() })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === "success") {
                            // Force the newly created profile to become the active selection
                            document.getElementById('profileSelect').value = data.name;
                            loadProfilesList();
                        }
                        else { alert(data.error); }
                    });
            }
        }

        function applyAndSave() {
            const profileName = document.getElementById('profileSelect').value;
            const config = {
                camera0: {
                    exposure: parseInt(document.getElementById('exp0_num').value),
                    analogue_gain: parseInt(document.getElementById('gain0_num').value),
                    horizontal_flip: document.getElementById('hflip0').checked ? 1 : 0,
                    vertical_flip: document.getElementById('vflip0').checked ? 1 : 0
                },
                camera1: {
                    exposure: parseInt(document.getElementById('exp1_num').value),
                    analogue_gain: parseInt(document.getElementById('gain1_num').value),
                    horizontal_flip: document.getElementById('hflip1').checked ? 1 : 0,
                    vertical_flip: document.getElementById('vflip1').checked ? 1 : 0
                }
            };

            fetch('/apply_and_save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ profile_name: profileName, config: config })
            })
                .then(response => response.json())
                .then(data => alert(`Success! Settings saved.`));
        }

        // Graceful server termination trigger
        function shutdownServer() {
            if (confirm("Are you sure you want to shut down the calibration tool? The camera streams will stop.")) {
                fetch('/shutdown', { method: 'POST' })
                    .then(() => {
                        document.body.innerHTML = "<h2 style='text-align:center; margin-top: 20%; color: #28a745;'>Server shut down safely. You can now close this tab.</h2>";
                    });
            }
        }

        window.onload = () => { loadProfilesList(); };
    </script>
</body>

</html>
