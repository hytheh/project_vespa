<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VESPA Exposure & Gain Tuning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        .camera-container {
            border: 2px solid #333;
            background-color: #000;
            padding: 0;
            text-align: center;
        }

        .video-feed {
            width: 100%;
            max-height: 38vh;
            object-fit: contain;
        }

        .control-panel {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-top: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .slider-label {
            font-weight: bold;
            color: #007bff;
            margin-bottom: 0;
        }

        /* Styling for the new manual number inputs */
        .number-input {
            width: 80px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            text-align: center;
            font-weight: bold;
        }

        .number-input:focus {
            background-color: #444;
            color: #fff;
            border-color: #007bff;
            box-shadow: none;
        }

        .card-dark {
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #e0e0e0;
            transition: opacity 0.3s;
        }

        .form-check-input:checked {
            background-color: #007bff;
            border-color: #007bff;
        }

        #status-bar {
            font-weight: bold;
            text-align: center;
            color: #ffc107;
            padding: 5px;
            height: 35px;
        }

        .mse-display {
            text-align: center;
            font-size: 1.1rem;
            margin: 5px 0;
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <h3 class="text-center mt-2">VESPA Optical Sensor Tuning</h3>
        <div id="status-bar">STATUS: Initializing Hardware...</div>

        <div class="row justify-content-center mb-2">
            <div class="col-md-6 text-center bg-dark p-2 rounded border border-secondary">
                <label class="fw-bold me-2">Active Profile:</label>
                <select id="profileSelect" class="form-select d-inline-block w-auto"
                    onchange="loadSelectedProfile()"></select>
                <button class="btn btn-info btn-sm ms-2 ui-btn" onclick="createNewProfile()">+ New Profile</button>
            </div>
        </div>

        <div class="row px-2">
            <div class="col-6 camera-container">
                <h6 class="text-center p-2 bg-primary m-0 text-white">Camera 1 (Left Eye /dev/video0)</h6>
                <img id="feed1" class="video-feed" alt="Starting..." src="">
            </div>
            <div class="col-6 camera-container">
                <h6 class="text-center p-2 bg-primary m-0 text-white">Camera 0 (Right Eye /dev/video1)</h6>
                <img id="feed0" class="video-feed" alt="Starting..." src="">
            </div>
        </div>

        <div class="mse-display" id="mseScore">Disparity (MSE): Calculating...</div>

        <div class="row control-panel mx-2">

            <div class="col-md-6 mb-2">
                <div class="card card-dark p-3">
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label slider-label">Exposure:</label>
                            <div>
                                <span id="camera1_exposure_calc" class="text-info small me-2"></span>
                                <input type="number"
                                    class="form-control form-control-sm ui-input number-input d-inline-block"
                                    id="camera1_exposure_num" min="1" max="10000">
                            </div>
                        </div>
                        <input type="range" class="form-range ui-input" id="camera1_exposure" min="1" max="10000"
                            step="1">
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label slider-label">Analogue Gain:</label>
                            <div>
                                <span id="camera1_gain_calc" class="text-info small me-2"></span>
                                <input type="number"
                                    class="form-control form-control-sm ui-input number-input d-inline-block"
                                    id="camera1_gain_num" min="1" max="1200">
                            </div>
                        </div>
                        <input type="range" class="form-range ui-input" id="camera1_gain" min="1" max="1200" step="1">
                    </div>

                    <div class="row mt-2">
                        <div class="col-sm-6 form-check form-switch">
                            <input type="checkbox" class="form-check-input ui-input" id="camera1_hflip">
                            <label class="form-check-label">Horizontal Flip</label>
                        </div>
                        <div class="col-sm-6 form-check form-switch">
                            <input type="checkbox" class="form-check-input ui-input" id="camera1_vflip">
                            <label class="form-check-label">Vertical Flip</label>
                        </div>
                    </div>

                    <button class="btn btn-sm btn-outline-info w-100 mt-3 ui-btn ui-input"
                        onclick="matchSettings('camera1', 'camera0')">🔄 Match Right Camera (0)</button>
                </div>
            </div>

            <div class="col-md-6 mb-2">
                <div class="card card-dark p-3">
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label slider-label">Exposure:</label>
                            <div>
                                <span id="camera0_exposure_calc" class="text-info small me-2"></span>
                                <input type="number"
                                    class="form-control form-control-sm ui-input number-input d-inline-block"
                                    id="camera0_exposure_num" min="1" max="10000">
                            </div>
                        </div>
                        <input type="range" class="form-range ui-input" id="camera0_exposure" min="1" max="10000"
                            step="1">
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label slider-label">Analogue Gain:</label>
                            <div>
                                <span id="camera0_gain_calc" class="text-info small me-2"></span>
                                <input type="number"
                                    class="form-control form-control-sm ui-input number-input d-inline-block"
                                    id="camera0_gain_num" min="1" max="1200">
                            </div>
                        </div>
                        <input type="range" class="form-range ui-input" id="camera0_gain" min="1" max="1200" step="1">
                    </div>

                    <div class="row mt-2">
                        <div class="col-sm-6 form-check form-switch">
                            <input type="checkbox" class="form-check-input ui-input" id="camera0_hflip">
                            <label class="form-check-label">Horizontal Flip</label>
                        </div>
                        <div class="col-sm-6 form-check form-switch">
                            <input type="checkbox" class="form-check-input ui-input" id="camera0_vflip">
                            <label class="form-check-label">Vertical Flip</label>
                        </div>
                    </div>

                    <button class="btn btn-sm btn-outline-info w-100 mt-3 ui-btn ui-input"
                        onclick="matchSettings('camera0', 'camera1')">🔄 Match Left Camera (1)</button>
                </div>
            </div>

            <div class="col-md-9 mt-2">
                <button class="btn btn-warning w-100 fw-bold fs-5 ui-btn ui-input" id="applySavedConfig"
                    onclick="applyAndSave()">💾 Apply & Save to Pipeline Config</button>
            </div>
            <div class="col-md-3 mt-2">
                <button class="btn btn-danger w-100 fw-bold fs-5 ui-btn" id="shutdownBtn" onclick="shutdownServer()">🛑
                    Shutdown</button>
            </div>
        </div>
    </div>

    <script>
        let statusTimeout;
        const EXPOSURE_MS_MULTIPLIER = 0.0175; // Approx line-time for Arducam 60fps

        function setStatus(msg, color) {
            clearTimeout(statusTimeout);
            $('#status-bar').text(msg).css('color', color);
            // Fallback to active status after 2 seconds
            if (msg !== 'STATUS: Live Streams Active' && msg !== 'STATUS: Offline') {
                statusTimeout = setTimeout(() => {
                    $('#status-bar').text('STATUS: Live Streams Active').css('color', '#28a745');
                }, 2000);
            }
        }

        $(document).ready(function () {
            setStatus('STATUS: Waking up OpenCV streams...', '#ffc107');
            $.get('/initialize_cameras', function () {
                $('#feed0').attr('src', '/video_feed/0');
                $('#feed1').attr('src', '/video_feed/1');

                setTimeout(function () {
                    loadProfilesList();
                    setInterval(fetchMSE, 500);
                }, 1500);
            });
            activateListeners();
        });

        function fetchMSE() {
            $.get('/get_mse', function (data) {
                $('#mseScore').text(`Disparity (MSE): ${data.mse} (Lower = Better)`);
            });
        }

        function loadProfilesList() {
            $.get('/list_profiles', function (data) {
                const select = $('#profileSelect');
                select.empty();
                data.profiles.forEach(p => select.append(new Option(p, p)));
                select.val(data.active);
                loadSelectedProfile();
            });
        }

        function loadSelectedProfile() {
            const name = $('#profileSelect').val();
            setReadOnlyMode(name === 'default');
            $.get(`/load_profile/${name}`, function (data) {
                applyConfigToHardwareAndUI(data);
            });
        }

        function createNewProfile() {
            const name = prompt("Enter a name for the new profile:");
            if (name && name.trim() !== "" && name.toLowerCase() !== "default") {
                $.ajax({
                    url: '/create_profile', type: 'POST', contentType: 'application/json',
                    data: JSON.stringify({ name: name.trim() }),
                    success: function (data) {
                        if (data.status === "success") {
                            $('#profileSelect').append(new Option(data.name, data.name));
                            $('#profileSelect').val(data.name);
                            loadSelectedProfile();
                        } else { alert(data.error); }
                    }
                });
            }
        }

        function setReadOnlyMode(isReadOnly) {
            $('.ui-input').prop('disabled', isReadOnly);
            $('.card-dark').css('opacity', isReadOnly ? '0.6' : '1.0');
        }

        function updateCalculatedUnits(logicalCam, type, value) {
            if (type === 'exposure') {
                $(`#${logicalCam}_exposure_calc`).text((value * EXPOSURE_MS_MULTIPLIER).toFixed(2) + ' ms');
            } else if (type === 'gain') {
                $(`#${logicalCam}_gain_calc`).text((value / 100.0).toFixed(2) + 'x');
            }
        }

        function applyConfigToHardwareAndUI(data) {
            for (let logicalCam in data) {
                const conf = data[logicalCam];

                // Set Sliders
                $(`#${logicalCam}_exposure`).val(conf.exposure);
                $(`#${logicalCam}_gain`).val(conf.analogue_gain);

                // Set Number Inputs
                $(`#${logicalCam}_exposure_num`).val(conf.exposure);
                $(`#${logicalCam}_gain_num`).val(conf.analogue_gain);

                // Set Math Units
                updateCalculatedUnits(logicalCam, 'exposure', conf.exposure);
                updateCalculatedUnits(logicalCam, 'gain', conf.analogue_gain);

                // Set Flips
                $(`#${logicalCam}_hflip`).prop('checked', conf.horizontal_flip === 1);
                $(`#${logicalCam}_vflip`).prop('checked', conf.vertical_flip === 1);
            }

            $.ajax({
                url: '/apply_full_config', type: 'POST', contentType: 'application/json',
                data: JSON.stringify(data),
                success: function () {
                    setStatus('STATUS: Profile Applied to Hardware', '#28a745');
                }
            });
        }

        function matchSettings(targetCam, sourceCam) {
            // Read source values
            const exp = $(`#${sourceCam}_exposure`).val();
            const gain = $(`#${sourceCam}_gain`).val();
            const hflip = $(`#${sourceCam}_hflip`).prop('checked');
            const vflip = $(`#${sourceCam}_vflip`).prop('checked');

            // Apply to target inputs and manually trigger their change events so they hit the hardware
            $(`#${targetCam}_exposure_num`).val(exp).trigger('change');
            $(`#${targetCam}_gain_num`).val(gain).trigger('change');
            $(`#${targetCam}_hflip`).prop('checked', hflip).trigger('change');
            $(`#${targetCam}_vflip`).prop('checked', vflip).trigger('change');
        }

        function applyAndSave() {
            const profileName = $('#profileSelect').val();
            const config = {
                camera0: {
                    exposure: parseInt($('#camera0_exposure').val()),
                    analogue_gain: parseInt($('#camera0_gain').val()),
                    horizontal_flip: $('#camera0_hflip').is(':checked') ? 1 : 0,
                    vertical_flip: $('#camera0_vflip').is(':checked') ? 1 : 0
                },
                camera1: {
                    exposure: parseInt($('#camera1_exposure').val()),
                    analogue_gain: parseInt($('#camera1_gain').val()),
                    horizontal_flip: $('#camera1_hflip').is(':checked') ? 1 : 0,
                    vertical_flip: $('#camera1_vflip').is(':checked') ? 1 : 0
                }
            };

            $.ajax({
                url: '/apply_and_save', type: 'POST', contentType: 'application/json',
                data: JSON.stringify({ profile_name: profileName, config: config }),
                success: function () { setStatus('STATUS: Settings Saved', '#007bff'); }
            });
        }

        function activateListeners() {
            // Slider Movement Listener
            $('input[type=range]').on('input', function () {
                const parts = this.id.split('_'); // e.g., ['camera0', 'exposure']
                $(`#${this.id}_num`).val(this.value); // Sync number box
                updateCalculatedUnits(parts[0], parts[1], this.value);
            }).on('change', function () {
                const parts = this.id.split('_');
                sendControlCommand(parts[0], parts[1], parseInt(this.value));
            });

            // Keyboard Number Input Listener
            $('input[type=number]').on('input', function () {
                const sliderId = this.id.replace('_num', ''); // e.g., 'camera0_exposure'
                const parts = sliderId.split('_');
                $(`#${sliderId}`).val(this.value); // Sync slider
                updateCalculatedUnits(parts[0], parts[1], this.value);
            }).on('change', function () {
                const sliderId = this.id.replace('_num', '');
                const parts = sliderId.split('_');
                sendControlCommand(parts[0], parts[1], parseInt(this.value));
            });

            // Checkbox Listener
            $('input[type=checkbox]').on('change', function () {
                const parts = this.id.split('_');
                const commandKey = (parts[1] === 'hflip') ? 'horizontal_flip' : 'vertical_flip';
                sendControlCommand(parts[0], commandKey, this.checked);
            });
        }

        function sendControlCommand(logicalCam, command, value) {
            $.ajax({
                url: '/command', type: 'POST', contentType: 'application/json',
                data: JSON.stringify({ camera_id: logicalCam, command: command, value: value }),
                success: function () {
                    setStatus(`COMMAND SENT: ${command}`, '#17a2b8');
                }
            });
        }

        function shutdownServer() {
            if (confirm("Shut down the calibration tool?")) {
                // Instantly freeze the UI status
                setStatus('STATUS: Offline', '#dc3545');

                // Disable all interaction (grey out controls)
                $('.ui-input').prop('disabled', true);
                $('.ui-btn').prop('disabled', true);
                $('#profileSelect').prop('disabled', true);
                $('.card-dark').css('opacity', '0.5');

                // Send the kill command
                $.post('/shutdown');
            }
        }
    </script>
</body>

</html>
