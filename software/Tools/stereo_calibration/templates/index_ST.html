<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VESPA Live Stereo Calibration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            text-align: center;
            margin-top: 20px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
            padding: 20px;
            background: #2c2c2c;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .video-feed {
            max-height: 50vh;
            object-fit: contain;
            width: 100%;
            max-width: 1280px;
            height: auto;
            border: 2px solid #555;
            background-color: #000;
            transition: opacity 0.3s;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
            margin: 0 10px;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            color: #888;
        }

        .btn-danger {
            background-color: #dc3545;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
            color: #ffc107;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>VESPA Live Stereo Hardware Stream</h2>
        <p>Position the Calibration Board (9x6 inner corners, 15mm) in view of both cameras.</p>

        <img class="video-feed" id="liveFeed" src="{{ url_for('video_feed') }}" alt="Live Hardware Stream Offline">

        <div class="controls">
            <button id="captureBtn">📸 Capture Calibration Pair</button>
            <button id="computeBtn">⚙️ Compute & Save Settings</button>
            <button id="shutdownBtn" class="btn-danger">🛑 Shutdown</button>
        </div>
        <div id="status">Status: Waiting for stream...</div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const captureBtn = document.getElementById('captureBtn');
        const computeBtn = document.getElementById('computeBtn');
        const shutdownBtn = document.getElementById('shutdownBtn');
        const liveFeed = document.getElementById('liveFeed');

        // Let the user know the stream is ready after load
        setTimeout(() => {
            statusDiv.innerText = "Status: Ready to Capture";
            statusDiv.style.color = "#28a745";
        }, 1500);

        // Capture Button Logic
        captureBtn.addEventListener('click', () => {
            statusDiv.innerText = "Status: Analyzing Frame for Checkerboard...";
            statusDiv.style.color = "#ffc107";

            fetch('/capture', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        statusDiv.innerText = `Status: Captured Pair #${data.count} successfully!`;
                        statusDiv.style.color = "#28a745";
                    } else {
                        statusDiv.innerText = `Status: ${data.message}`;
                        statusDiv.style.color = "#dc3545";
                    }
                })
                .catch(err => {
                    statusDiv.innerText = `Error: Could not reach backend.`;
                    statusDiv.style.color = "#dc3545";
                });
        });

        // Compute Button Logic
        computeBtn.addEventListener('click', () => {
            statusDiv.innerText = "Status: Crunching Calibration Math (This may take 10+ seconds)...";
            statusDiv.style.color = "#ffc107";

            fetch('/compute', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        statusDiv.innerText = `Success! RMS: ${data.rms} | Baseline: ${data.baseline}mm. Saved to JSON.`;
                        statusDiv.style.color = "#28a745";
                        alert(`Calibration Complete!\nRMS Error: ${data.rms}\nCalculated Baseline: ${data.baseline} mm\nPairs Used: ${data.pairs_used}`);
                    } else {
                        statusDiv.innerText = `Error: ${data.message}`;
                        statusDiv.style.color = "#dc3545";
                    }
                });
        });

        // Shutdown Button Logic
        shutdownBtn.addEventListener('click', () => {
            if (confirm("Shut down the stereo calibrator?")) {
                // 1. Instantly freeze the UI status
                statusDiv.innerText = 'Status: Offline';
                statusDiv.style.color = '#dc3545';

                // 2. Disable all interaction and grey out the UI
                captureBtn.disabled = true;
                computeBtn.disabled = true;
                shutdownBtn.disabled = true;

                // Visually dim the buttons and the video feed
                captureBtn.style.opacity = '0.5';
                computeBtn.style.opacity = '0.5';
                shutdownBtn.style.opacity = '0.5';
                liveFeed.style.opacity = '0.3';

                // 3. Send the kill command to the Python backend (Fire and forget)
                fetch('/shutdown', { method: 'POST' })
                    .then(() => console.log("Server shutdown signal sent."))
                    .catch(err => console.log("Connection closed."));
            }
        });
    </script>
</body>

</html>
